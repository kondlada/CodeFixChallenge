name: Attach Test Results to PR

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  run-tests-and-attach:
    name: Run Tests and Attach Results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Tests with Coverage
        run: |
          ./gradlew testDebugUnitTest jacocoTestReport --no-daemon
          
          # Create reports directory
          mkdir -p pr-reports
          
          # Copy test results
          if [ -d "app/build/reports/tests/testDebugUnitTest" ]; then
            cp -r app/build/reports/tests/testDebugUnitTest pr-reports/tests
          fi
          
          # Copy coverage reports
          if [ -d "app/build/reports/jacoco/jacocoTestReport" ]; then
            cp -r app/build/reports/jacoco/jacocoTestReport pr-reports/coverage
          fi

      - name: Generate Test Summary
        if: always()
        run: |
          cat > pr-reports/SUMMARY.md << 'EOF'
          # 🧪 Automated Test Results
          
          ## Test Execution Summary
          
          **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **PR:** #${{ github.event.pull_request.number }}
          **Branch:** ${{ github.head_ref }}
          
          ## Results
          
          ### Unit Tests
          Status: ${{ job.status }}
          
          ### Coverage Report
          Full coverage report available in artifacts below.
          
          ### Reports Included
          - `tests/` - Complete test execution results
          - `coverage/` - Code coverage HTML report
          
          ## Download Artifacts
          
          All test reports are available as artifacts in this workflow run.
          Click on "Summary" at the top to download.
          
          EOF

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr-${{ github.event.pull_request.number }}
          path: pr-reports/
          retention-days: 30

      - name: Comment PR with Test Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            const body = `## 🧪 Automated Test Results
            
            **Status:** ${{ job.status }}
            **Workflow Run:** [View Details](${runUrl})
            
            ### 📊 Test Reports
            
            All test results and coverage reports have been generated and attached to this PR.
            
            **Download Reports:**
            1. Go to [Workflow Run](${runUrl})
            2. Scroll to "Artifacts" section
            3. Download \`test-results-pr-${{ github.event.pull_request.number }}\`
            
            **Reports Included:**
            - ✅ Unit Test Results (HTML)
            - ✅ Code Coverage Report (HTML with metrics)
            - ✅ Test Summary
            
            ### 📁 View Reports
            
            After downloading and extracting the artifact:
            - Open \`tests/index.html\` for test results
            - Open \`coverage/html/index.html\` for coverage report
            
            ---
            **🤖 Generated by:** GitHub Actions
            **📅 Timestamp:** ${new Date().toISOString()}`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            app/build/test-results/**/*.xml
          check_name: Unit Test Results
          comment_mode: always

